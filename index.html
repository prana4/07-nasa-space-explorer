<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <div>
        <h1>Space Explorer</h1>
        <p class="subtitle">Explore NASA’s Astronomy Picture of the Day gallery.</p>
      </div>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="loadButton" type="button">Get Space Images</button>
    </div>

    <section class="fact-card">
      <h2>Did You Know?</h2>
      <p id="spaceFactText">A new space fact appears here when the page loads.</p>
    </section>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <div id="modal" class="modal hidden" aria-hidden="true">
    <div class="modal-overlay" data-action="close"></div>
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="close-button" type="button" data-action="close">×</button>
      <div class="modal-body">
        <div class="modal-media" id="modalMedia"></div>
        <div class="modal-copy">
          <h2 id="modalTitle"></h2>
          <p class="modal-date" id="modalDate"></p>
          <p class="modal-description" id="modalDescription"></p>
          <a id="modalLink" class="modal-link" target="_blank" rel="noopener">View original NASA entry</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
